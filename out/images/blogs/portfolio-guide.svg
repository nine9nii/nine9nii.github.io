  <!-- Browser window -->
  <rect x="290" y="145" width="220" height="160" rx="8"
    fill="none" stroke="white" stroke-width="2.5" opacity="0.9"/>
  <!-- Browser bar -->
  <line x1="290" y1="175" x2="510" y2="175" stroke="white" stroke-width="2" opacity="0.4"/>
  <!-- Traffic light dots -->
  <circle cx="308" cy="160" r="4" fill="white" opacity="0.3"/>
  <circle cx="322" cy="160" r="4" fill="white" opacity="0.3"/>
  <circle cx="336" cy="160" r="4" fill="white" opacity="0.3"/>
  <!-- URL bar -->
  <rect x="352" y="153" width="140" height="14" rx="7" fill="white" opacity="0.08"/>
  <!-- Content lines -->
  <rect x="308" y="192" width="80" height="7" rx="3" fill="white" opacity="0.5"/>
  <rect x="308" y="207" width="184" height="5" rx="2" fill="white" opacity="0.2"/>
  <rect x="308" y="218" width="160" height="5" rx="2" fill="white" opacity="0.2"/>
  <rect x="308" y="236" width="100" height="28" rx="4" fill="white" opacity="0.1"/>
</svg>
