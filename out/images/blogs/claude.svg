<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#0a0a0a"/>
  <!-- Hexagonal Claude "C" logo outline -->
  <polygon points="400,140 450,168 450,224 400,252 350,224 350,168"
    fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round" opacity="0.9"/>
  <!-- Inner C shape -->
  <path d="M435 178 Q410 165 388 178 Q370 190 370 196 Q370 210 388 218 Q410 228 435 218"
    fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <!-- Radiating lines (context window rays) -->
  <line x1="400" y1="115" x2="400" y2="130" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="470" y1="133" x2="460" y2="147" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="492" y1="196" x2="476" y2="196" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="470" y1="259" x2="460" y2="245" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="400" y1="277" x2="400" y2="262" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="330" y1="259" x2="340" y2="245" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="308" y1="196" x2="324" y2="196" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="330" y1="133" x2="340" y2="147" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <!-- CLAUDE.md file icon -->
  <rect x="200" y="175" width="70" height="88" rx="4"
    fill="none" stroke="white" stroke-width="1.8" opacity="0.6"/>
  <path d="M200 193 L270 193" stroke="white" stroke-width="1" opacity="0.3"/>
  <text x="235" y="226" font-family="monospace" font-size="10" fill="white" opacity="0.5" text-anchor="middle">CLAUDE</text>
  <text x="235" y="240" font-family="monospace" font-size="10" fill="white" opacity="0.5" text-anchor="middle">.md</text>
  <!-- Terminal / prompt icon -->
  <rect x="530" y="175" width="70" height="88" rx="4"
    fill="none" stroke="white" stroke-width="1.8" opacity="0.6"/>
  <path d="M530 193 L600 193" stroke="white" stroke-width="1" opacity="0.3"/>
  <text x="548" y="220" font-family="monospace" font-size="11" fill="white" opacity="0.6">$</text>
  <text x="558" y="220" font-family="monospace" font-size="9" fill="white" opacity="0.4">claude</text>
  <text x="548" y="235" font-family="monospace" font-size="9" fill="white" opacity="0.3">/init</text>
  <!-- Connecting lines -->
  <line x1="270" y1="218" x2="350" y2="210" stroke="white" stroke-width="1" stroke-dasharray="4,4" opacity="0.25"/>
  <line x1="450" y1="210" x2="530" y2="218" stroke="white" stroke-width="1" stroke-dasharray="4,4" opacity="0.25"/>
  <!-- Label -->
  <text x="400" y="340" font-family="monospace" font-size="13" fill="white" opacity="0.35" text-anchor="middle" letter-spacing="4">CLAUDE CODE</text>
</svg>
